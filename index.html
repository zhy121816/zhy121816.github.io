<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
            color: #333;
        }
        .game-section {
            margin: 20px auto;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .game-box {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .game-box:hover {
            transform: scale(1.05);
        }
        .game-title {
            font-size: 20px;
            color: #007BFF;
            margin-bottom: 10px;
        }
        .game-description {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>游戏</h1>
    <div class="game-section">
        <div class="game-box" onclick="window.location.href='./game/OItrainer/index.html';">
            <div class="game-title">OI  教练模拟器</div>
            <div class="game-description">OI  教练模拟器</div>
        </div>
        <div class="game-box" onclick="window.location.href='./game/lightsoutgame/index.html';">
            <div class="game-title">Lights Out Game</div>
            <div class="game-description">熄灯游戏</div>
        </div>
    </div>
</body>
</html>
