<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhanghongyi121816的个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            min-height: 100vh;
            /* 完全不使用深色叠加，或者使用很浅的叠加 */
            background: 
                linear-gradient(rgba(50, 70, 100, 0.2), rgba(50, 70, 100, 0.3)),
                url('./image/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0f0ff;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 科技感背景效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 100, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(120, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        
        /* 头部样式 */
        header {
            text-align: center;
            padding: 60px 0 40px;
            position: relative;
        }
        
        .header-title {
            font-size: 3.2rem;
            font-weight: 700;
            /* 使用更亮、更饱和的颜色 */
            background: linear-gradient(90deg, #8ae2ff, #7d9bff, #c477ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 25px rgba(138, 226, 255, 0.6);
            letter-spacing: 1px;
            /* 可选：增加一点对比度 */
            filter: brightness(1.2);
        }
        
        .header-subtitle {
            font-size: 1.2rem;
            color: #a0c8ff;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
        
        /* 栏目容器 */
        .sections-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        /* 单个栏目样式 */
        .section {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            background: rgba(20, 25, 50, 0.6);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 10, 30, 0.4);
            border: 1px solid rgba(100, 150, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: transform 0.4s, box-shadow 0.4s;
        }
        
        .section:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 20, 60, 0.5);
        }
        
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .games .section-title {
            color: #4cc9f0;
            border-bottom-color: rgba(76, 201, 240, 0.5);
        }
        
        .projects .section-title {
            color: #a855f7;
            border-bottom-color: rgba(168, 85, 247, 0.5);
        }
        
        .articles .section-title {
            color: #10b981;
            border-bottom-color: rgba(16, 185, 129, 0.5);
        }
        
        .section-title i {
            font-size: 1.6rem;
        }
        
        /* 小方块网格 */
        .blocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 18px;
        }
        
        /* 小方块样式 */
        .block {
            background: rgba(30, 35, 60, 0.7);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 150, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .block::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }
        
        .block:hover::before {
            left: 100%;
        }
        
        .games .block:hover {
            background: rgba(76, 201, 240, 0.15);
            border-color: rgba(76, 201, 240, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(76, 201, 240, 0.3);
        }
        
        .projects .block:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }
        
        .articles .block:hover {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        
        .block-icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
            display: block;
        }
        
        .games .block-icon {
            color: #4cc9f0;
        }
        
        .projects .block-icon {
            color: #a855f7;
        }
        
        .articles .block-icon {
            color: #10b981;
        }
        
        .block-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e0f0ff;
        }
        
        .block-desc {
            font-size: 0.8rem;
            color: #a0c8ff;
            margin-top: 5px;
            opacity: 0.8;
        }
        .block.disable {
            pointer-events: none;  /* 禁用所有鼠标事件 */
            cursor: default;       /* 鼠标指针改为默认箭头 */
            opacity: 0.6;          /* 降低透明度表示不可用状态 */
            filter: grayscale(40%); /* 添加灰度效果 */
        }
        /* 底部样式 */
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(100, 150, 255, 0.2);
            margin-top: 20px;
        }
        
        .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .email {
            font-size: 1.1rem;
            color: #a0c8ff;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(20, 25, 50, 0.6);
            border-radius: 50px;
            border: 1px solid rgba(100, 150, 255, 0.2);
            transition: all 0.3s;
        }
        
        .email:hover {
            background: rgba(30, 35, 60, 0.8);
            border-color: rgba(100, 150, 255, 0.4);
            transform: translateY(-3px);
        }
        
        .email i {
            color: #4cc9f0;
        }
        
        .copyright {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7890c0;
        }
        
        /* 响应式设计 */
        @media (max-width: 992px) {
            .sections-container {
                gap: 30px;
            }
            
            .section {
                min-width: 100%;
                max-width: 500px;
            }
        }
        
        @media (max-width: 768px) {
            .header-title {
                font-size: 2.5rem;
            }
            
            .blocks-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .contact-info {
                flex-direction: column;
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .header-title {
                font-size: 2rem;
            }
            
            .section {
                padding: 20px;
            }
            
            .blocks-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .section {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .games { animation-delay: 0.1s; }
        .projects { animation-delay: 0.2s; }
        .articles { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="header-title">个人主页</h1>
            <p class="header-subtitle">探索游戏世界、创新项目与技术文章</p>
        </header>
        
        <main class="sections-container">
            <!-- 游戏栏目 -->
            <section class="section games">
                <h2 class="section-title"><i class="fas fa-gamepad"></i> 游戏</h2>
                <div class="blocks-grid">
                    <div class="block" onclick="location.href='./game/OItrainer/index.html'">

            <!-- 项目栏目 -->
            <section class="section projects">
                <h2 class="section-title"><i class="fas fa-code"></i> 项目</h2>
                <div class="blocks-grid">
                    <div class="block disable" onclick="location.href='project1.html'">

                    <div class="block disable" onclick="location.href='project3.html'">
                        <i class="fas fa-mobile-alt block-icon"></i>

                        <div class="block-desc">已锁定</div>
                    </div>
                    <div class="block disable" onclick="location.href='project4.html'">
                        <i class="fas fa-shield-alt block-icon"></i>
                        <div class="block-title">暂时没有</div>
                        <div class="block-desc">已锁定</div>
                    </div>
                </div>
            </section>
            
            <!-- 文章栏目 -->
            <section class="section articles">
                <h2 class="section-title"><i class="fas fa-newspaper"></i> 文章</h2>
                <div class="blocks-grid">
                    <div class="block disable" onclick="location.href='article1.html'">
                        <i class="fas fa-microchip block-icon"></i>
                        <div class="block-title">暂时没有</div>
                        <div class="block-desc">已锁定</div>
                    </div>
                    <div class="block disable" onclick="location.href='article2.html'">
                        <i class="fas fa-code-branch block-icon"></i>
                        <div class="block-title">暂时没有</div>
                        <div class="block-desc">已锁定</div>
                    </div>
                    <div class="block disable" onclick="location.href='article3.html'">
                        <i class="fas fa-vr-cardboard block-icon"></i>
                        <div class="block-title">暂时没有</div>
                        <div class="block-desc">已锁定</div>
                    </div>
                    <div class="block disable" onclick="location.href='article4.html'">
                        <i class="fas fa-lock block-icon"></i>
                        <div class="block-title">暂时没有</div>

                </div>
            </section>
        </main>
        
        <footer>
            <div class="contact-info">
                <div class="email">
                    <i class="fas fa-envelope"></i>
                    zhanghongyi121816@163.com
                </div>
            </div>
            <div class="copyright">
                &copy; 2026 zhy121816的主页
            </div>
        </footer>
    </div>

    <script>
        // 添加交互效果
        document.addEventListener('DOMContentLoaded', function() {
            // 为每个小方块添加点击效果
            const blocks = document.querySelectorAll('.block');
            blocks.forEach(block => {
                block.addEventListener('click', function() {
                    // 添加点击反馈
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                });
            });
            
            // 添加背景动画效果
            const createParticle = () => {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = Math.random() * 3 + 1 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = `rgba(${Math.random() * 100 + 150}, ${Math.random() * 100 + 150}, 255, ${Math.random() * 0.5 + 0.2})`;
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = '100vh';
                particle.style.zIndex = '1';
                particle.style.pointerEvents = 'none';
                document.body.appendChild(particle);
                
                // 粒子动画
                const animation = particle.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                    { transform: `translateY(-${Math.random() * 50 + 50}vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 3000 + 3000,
                    easing: 'cubic-bezier(0.2, 0, 0.8, 1)'
                });
                
                animation.onfinish = () => {
                    particle.remove();
                };
            };
            
            // 创建一些背景粒子
            for (let i = 0; i < 100; i++) {
                setTimeout(() => createParticle(), i * 300);
            }
            
            // 定期创建新粒子
            setInterval(createParticle, 2000);
        });
    </script>
</body>
</html>
