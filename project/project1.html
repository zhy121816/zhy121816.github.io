    <script>
        // 简化版：直接显示内容
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('markdown-content');
            
            // 检查marked.js是否加载
            if (typeof marked === 'undefined') {
                container.innerHTML = '<p style="color:#ff6b8b;">错误：marked.js库加载失败</p>';
                return;
            }
            
            // 简单的Markdown内容（避免转义问题）
            const markdown = `
# 代码（未完成）一部分来自洛谷
\`\`\`cpp
#ifndef BIGINT__LUOGU_H
#define BIGINT__LUOGU_H

#include <cstring>
#include <cstdio>
#include <algorithm>
#include <string>

#define MAXN 100
struct BigInt{
	int len, a[MAXN];
	BigInt(int x = 0){ //通过初始化使得这个大整数能够表示整型 x，默认为0
		std::memset(a,0,sizeof(a));
		for(len = 1;x;len++){
			a[len] = x % 10,x /= 10;
		}
		len--;
		
	}
	BigInt(const std::string& str) {
		std::memset(a, 0, sizeof(a)); // 初始化数组为0
		len = str.size(); // 直接使用字符串长度
		
		// 逆序存储数字（a[1]为个位，a[2]为十位，依此类推）
		for (int i = 0; i < len; i++) {
			a[len - i] = str[i] - '0'; // 字符转数字
		}
	}
	int &operator[](int i){
		return a[i];
	}
	void flatten(int L){
		len = L;
		for(int i = 1;i <= len;i++){
			a[i + 1] += a[i] / 10,a[i] %= 10;
		}
		for(;!a[len];){
			len--;
		}
		return;
	}
	void print(){ //输出
		for(int i = std::max(len,1);i >= 1;i--){
			std::printf("%d",a[i]);
		}
	}
};

BigInt operator+(BigInt a,BigInt b){ //表示两个BigInt类相加，返回一个BigInt类
	BigInt c;
	int len = std::max(a.len,b.len);
	for(int i = 1;i <= len;i++){
		c[i] += a[i] + b[i];
	}
	c.flatten(len + 1); //答案不超过len + 1位，所以用len + 1做一遍“展平”处理进位
	return c;
}


BigInt operator-(BigInt a, BigInt b) { // 表示两个BigInt类相减，返回一个BigInt类（假设a >= b）
	BigInt c;
	int len = std::max(a.len, b.len);
	for (int i = 1; i <= len; i++) {
		c[i] += a[i] - b[i]; // 逐位相减
		if (c[i] < 0) { // 处理借位
			c[i] += 10;
			c[i + 1] -= 1;
		}
	}
	c.flatten(len); // 处理结果的位数
	return c;
}


BigInt operator*(BigInt a,int b){ //表示BigInt类乘整型变量，返回一个BigInt类
	BigInt c;
	int len = a.len;
	for(int i = 1;i <= len;i++){
		c[i] = a[i] * b;
	}
	c.flatten(len + 11); //int类型最长10位，所以可以这样做一遍“展平”处理进位
	return c;
}


bool operator>(const BigInt& lhs, const BigInt& rhs) {
	// 1. 比较长度
	if (lhs.len > rhs.len) return true;
	if (lhs.len < rhs.len) return false;
	// 2. 长度相同，逐位比较（从最高位开始）
	for (int i = lhs.len; i >= 1; i--) {
		if (lhs.a[i] > rhs.a[i]) return true;
		if (lhs.a[i] < rhs.a[i]) return false;
	}
	// 3. 完全相等
	return false;
}

#endif //BIGINT__LUOGU_H
\`\`\`
`;

            // 转换并显示
            try {
                const html = marked.parse(markdown);
                container.innerHTML = html;
            } catch (error) {
                console.error('转换失败:', error);
                container.innerHTML = '<p style="color:#ff6b8b;">内容转换失败</p>';
            }
            
            // 标签悬停效果
            const tags = document.querySelectorAll('.tag');
            tags.forEach(tag => {
                tag.addEventListener('mouseenter', function() {
                    this.style.backgroundColor = 'rgba(76, 201, 240, 0.25)';
                    this.style.borderColor = 'rgba(76, 201, 240, 0.5)';
                });
                
                tag.addEventListener('mouseleave', function() {
                    this.style.backgroundColor = '';
                    this.style.borderColor = '';
                });
            });
        });
